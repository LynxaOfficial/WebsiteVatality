<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHook Panel - Activity Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }

        .header {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff88;
        }

        .logs-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #0f3460;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #0f3460;
        }

        .logs-header h2 {
            font-size: 20px;
        }

        .clear-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .clear-btn:hover {
            background: #b91c1c;
        }

        .log-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .log-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #00ff88;
            font-family: monospace;
            font-size: 13px;
        }

        .log-item.error {
            border-left-color: #dc2626;
        }

        .log-item.warning {
            border-left-color: #f59e0b;
        }

        .log-time {
            color: #888;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .log-data {
            color: #ddd;
            word-break: break-all;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 8px;
        }

        .badge-start { background: #10b981; }
        .badge-report { background: #3b82f6; }
        .badge-scam { background: #ef4444; }
        .badge-fake { background: #f59e0b; }
        .badge-buyer { background: #8b5cf6; }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-item {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📡 WebHook Panel - Activity Monitor</h1>
        <p>Real-time log dari bot Telegram | @RitxzUltimate444</p>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Logs</h3>
                <div class="value" id="totalLogs">0</div>
            </div>
            <div class="stat-card">
                <h3>Reports Today</h3>
                <div class="value" id="reportsToday">0</div>
            </div>
            <div class="stat-card">
                <h3>Active Users</h3>
                <div class="value" id="activeUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Last Activity</h3>
                <div class="value" id="lastActivity">-</div>
            </div>
        </div>

        <div class="logs-container">
            <div class="logs-header">
                <h2>📋 Activity Logs</h2>
                <button class="clear-btn" onclick="clearLogs()">Clear All</button>
            </div>
            <div class="log-list" id="logList">
                <div class="log-item">
                    <div class="log-time">🟢 SYSTEM</div>
                    <div class="log-data">WebHook panel ready. Menunggu data dari bot...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2024 Piantech Comunity | WebHook Panel v1.0
    </div>

    <script>
        let logs = [];
        let stats = {
            totalLogs: 0,
            reportsToday: 0,
            activeUsers: new Set(),
            lastActivity: null
        };

        function formatTime() {
            return new Date().toLocaleString('id-ID');
        }

        function addLog(type, data) {
            const logItem = {
                id: Date.now(),
                time: formatTime(),
                type: type,
                data: data,
                raw: data
            };
            logs.unshift(logItem);
            stats.totalLogs++;
            stats.lastActivity = formatTime();

            if (type === 'REPORT_SENT') {
                stats.reportsToday++;
                stats.activeUsers.add(data.userId);
            }
            if (type === 'START_BOT') {
                stats.activeUsers.add(data.userId);
            }

            updateUI();
            renderLogs();
        }

        function updateUI() {
            document.getElementById('totalLogs').innerText = stats.totalLogs;
            document.getElementById('reportsToday').innerText = stats.reportsToday;
            document.getElementById('activeUsers').innerText = stats.activeUsers.size;
            document.getElementById('lastActivity').innerText = stats.lastActivity || '-';
        }

        function getBadge(type) {
            const badges = {
                'BOT_START': '<span class="badge badge-start">🚀 START</span>',
                'START_BOT': '<span class="badge badge-start">👤 START</span>',
                'REPORT_SENT': '<span class="badge badge-report">📋 REPORT</span>',
                'TAG_SCAM_START': '<span class="badge badge-scam">🚨 SCAM</span>',
                'TAG_FAKE_START': '<span class="badge badge-fake">🔴 FAKE</span>',
                'BUYER_INTEREST': '<span class="badge badge-buyer">💰 BUYER</span>',
                'CEK_USERNAME': '<span class="badge badge-start">🔍 CEK</span>'
            };
            return badges[type] || '<span class="badge badge-start">📡 LOG</span>';
        }

        function formatData(data) {
            if (typeof data === 'object') {
                return JSON.stringify(data, null, 2);
            }
            return data;
        }

        function renderLogs() {
            const logList = document.getElementById('logList');
            if (logs.length === 0) {
                logList.innerHTML = '<div class="log-item"><div class="log-time">🟢 SYSTEM</div><div class="log-data">Belum ada log masuk. Menunggu data dari bot...</div></div>';
                return;
            }

            logList.innerHTML = logs.slice(0, 100).map(log => `
                <div class="log-item">
                    <div class="log-time">
                        ${getBadge(log.type)}
                        📅 ${log.time}
                    </div>
                    <div class="log-data">
                        <pre style="margin:0; font-family:monospace; white-space:pre-wrap; word-break:break-all;">${formatData(log.data)}</pre>
                    </div>
                </div>
            `).join('');
        }

        function clearLogs() {
            logs = [];
            stats = {
                totalLogs: 0,
                reportsToday: 0,
                activeUsers: new Set(),
                lastActivity: null
            };
            updateUI();
            renderLogs();
            addLog('SYSTEM', 'Logs cleared by admin');
        }

        // ==================== WEBHOOK RECEIVER ====================
        async function handleWebhook(data) {
            console.log('Webhook received:', data);
            
            if (data.type === 'ping') {
                return { status: 'ok', message: 'pong' };
            }

            addLog(data.type, data);
            return { status: 'ok', received: true };
        }

        // Untuk testing manual via form
        function sendTestLog() {
            const testData = {
                type: 'TEST_LOG',
                userId: 123456789,
                message: 'This is a test log from webhook panel',
                timestamp: new Date().toISOString()
            };
            addLog('TEST_LOG', testData);
        }

        // Auto refresh setiap detik
        setInterval(() => {
            document.getElementById('lastActivity').innerText = stats.lastActivity || '-';
        }, 1000);
    </script>
</body>
</html>
